# -----------------------------------------------------------------------------
# Site settings
# -----------------------------------------------------------------------------

title: Hyeonseo Oh
first_name: Hyeonseo
middle_name:
last_name: Oh
email: gustj5092@yonsei.ac.kr
description: > 
  B.S. Mechanical Engineering @ Yonsei University.
  Autonomous Driving & Safety-Critical Control Researcher.
  Interested in Robust CBF, MPC/MPPI, E2E Racing, and Robotics.

footer_text: >
  Powered by <a href="https://jekyllrb.com/" target="_blank">Jekyll</a> with 
  <a href="https://github.com/alshedivat/al-folio">al-folio</a> theme.

icon: "⚙️"  # the emoji used as the favicon

url: https://[본인아이디].github.io  # ← 여기에 본인 GitHub 아이디로 변경
baseurl:
last_updated: true
impressum_path:

# -----------------------------------------------------------------------------
# Theme
# -----------------------------------------------------------------------------

repo_theme_light: default
repo_theme_dark: dark
repo_trophies:
  enabled: true
  theme_light: flat
  theme_dark: gitdimmed

# -----------------------------------------------------------------------------
# RSS Feed
# -----------------------------------------------------------------------------
rss_icon: false

# -----------------------------------------------------------------------------
# Layout
# -----------------------------------------------------------------------------

navbar_fixed: true
footer_fixed: false
search_enabled: false
socials_in_search: false

bib_search:
  enabled: false
  provider: jquery.js

nav_bar_title:  # Leave empty to use title

# -----------------------------------------------------------------------------
# Open Graph & Schema.org
# -----------------------------------------------------------------------------

serve_og_meta: false
og_image:

# -----------------------------------------------------------------------------
# Social integration
# -----------------------------------------------------------------------------

github_username: [본인GitHub아이디]         # ← 변경
linkedin_username:                         # ← LinkedIn 있으면 입력
scholar_userid:                            # ← Google Scholar 있으면 입력
orcid_id:
research_gate_profile:

contact_note:

# -----------------------------------------------------------------------------
# Analytics and search engine verification
# -----------------------------------------------------------------------------

google_analytics:
cronitor_analytics:
pirsch_analytics:
openpanel_analytics:

google_site_verification:
bing_site_verification:

# -----------------------------------------------------------------------------
# Blog
# -----------------------------------------------------------------------------

blog_name: Notes
blog_nav_title: Blog
blog_description: Thoughts on autonomous driving and control systems.
permalink: /blog/:year/:title/

pagination:
  enabled: true

# -----------------------------------------------------------------------------
# Collections
# -----------------------------------------------------------------------------

collections:
  news:
    defaults:
      layout: post
    output: false
    permalink: /news/:path/
  projects:
    output: true
    permalink: /projects/:path/

announcements:
  enabled: false
  scrollable: true
  limit: 5

latest_posts:
  enabled: false
  scrollable: true
  limit: 3

# -----------------------------------------------------------------------------
# Jekyll settings
# -----------------------------------------------------------------------------

markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter_opts:
    css_class: "highlight"
    span:
      line_numbers: false
    block:
      line_numbers: false
      start_line: 1

include: ["_pages"]
exclude:
  - bin/
  - CONTRIBUTING.md
  - CUSTOMIZE.md
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - README.md
  - robots.txt
  - vendor

keep_files:
  - CNAME
  - .nojekyll

# -----------------------------------------------------------------------------
# Plug-ins
# -----------------------------------------------------------------------------

plugins:
  - jekyll-archives-v2
  - jekyll-email-protect
  - jekyll-feed
  - jekyll-get-json
  - jekyll-imagemagick
  - jekyll-jupyter-notebook
  - jekyll-link-attributes
  - jekyll-minifier
  - jekyll-paginate-v2
  - jekyll/scholar
  - jekyll-sitemap
  - jekyll-toc
  - jekyll-twitter-plugin
  - jemoji
